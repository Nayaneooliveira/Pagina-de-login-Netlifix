<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header >
        <img  class="longo-principal"  src="/css/netflixlogo.png" alt="longo">
    </header>
    <main>
     <section class="titulo">
        <h1>Entrar</h1>
    </section>
   <section class="formularios">
    <input class="email" type="Email" id="Email" name="Email" placeholder="Email ou Numero de Telefone"><br>
    <input class="senha"  type="password" id="Senha" name="Senha" placeholder="Digite sua senha...">
   </section>
   
   <section>
     <button class="button">Entrar</button>
   </section>
   <section class="suporte">
     <span class="check"><input type="checkbox" ></span>
     <span classs="lembre">Lembre-se de mim</span>
     <a href="#" class="help">Precisa de Ajuda?</a>
   </section>
     <footer>
        <section class="login_facebook">
           <span><img  src="/css/Facebook_logo.png" alt="" width="50px"></span>
           <span><a class="link" href="#">Conecta com Facebook</a></span>
        </section>
        <section class="sign_up">
         <p>Novo por aqui?<a href="#">Assine Agora.</a></p>
         <p class="terms">&copy  Esta página é protegida pelo Google reCAPTCHA para garantir que você não é um robô. <a href="#">Saiba Mais</a></p>
        </section>
     </footer>
    </main>
</body>
</html>
